  - platform: modbus_controller
    modbus_controller_id: fast
    id: inverter_mode
    name: "${cat2} Inverter Mode"
    entity_category: DIAGNOSTIC
    address: 0x101D
    register_type: holding
    raw_encode: HEXBYTES
    lambda: |-
      uint16_t value = modbus_controller::word_from_hex_str(x, 0);
      switch(value) {
        case 0: return {"Initial"};
        case 1: return {"Standby"};
        case 3: return {"On Grid"};
        case 4: return {"Off Grid"};
        case 5: return {"Fault"};
        case 9: return {"Shutdown"};
        default: return {"Unknown"};
      }

# =========================
# 🚨 ERRORS
# =========================
  - platform: modbus_controller
    modbus_controller_id: fast
    id: fault_information
    name: "${cat2} Fault Information"
    entity_category: DIAGNOSTIC
    address: 0x101E
    register_type: holding
    register_count: 2
    raw_encode: HEXBYTES
    lambda: |-
      static const uint8_t WARNINGS_SIZE = 32;
      static const char *const WARNINGS[WARNINGS_SIZE] = {
          "Grid AC over voltage",                                        // 0000 0000 0000 0000 0000 0000 0000 0001 (1)
          "Grid AC under voltage",                                       // 0000 0000 0000 0000 0000 0000 0000 0010 (2)
          "Grid AC absent",                                              // 0000 0000 0000 0000 0000 0000 0000 0100 (3)
          "Grid AC over frequency",                                      // 0000 0000 0000 0000 0000 0000 0000 1000 (4)
          "Grid AC under frequency",                                     // 0000 0000 0000 0000 0000 0000 0001 0000 (5)
          "PV DC over voltage",                                          // 0000 0000 0000 0000 0000 0000 0010 0000 (6)
          "PV insulation abnormal",                                      // 0000 0000 0000 0000 0000 0000 0100 0000 (7)
          "Leakage current abnormal",                                    // 0000 0000 0000 0000 0000 0000 1000 0000 (8)
          "Inverter in power limit state",                               // 0000 0000 0000 0000 0000 0001 0000 0000 (9)
          "Control power low",                                           // 0000 0000 0000 0000 0000 0010 0000 0000 (10)
          "PV string abnormal",                                          // 0000 0000 0000 0000 0000 0100 0000 0000 (11)
          "PV DC under voltage",                                         // 0000 0000 0000 0000 0000 1000 0000 0000 (12)
          "PV irradiation weak",                                         // 0000 0000 0000 0000 0001 0000 0000 0000 (13)
          "Grid abnormal",                                               // 0000 0000 0000 0000 0010 0000 0000 0000 (14)
          "Arc fault detection",                                         // 0000 0000 0000 0000 0100 0000 0000 0000 (15)
          "AC moving average voltage  high",                             // 0000 0000 0000 0000 1000 0000 0000 0000 (16)
          "Output DC over current",                                      // 0000 0000 0000 0001 0000 0000 0000 0000 (17)
          "Inverrter relay abnormal",                                    // 0000 0000 0000 0010 0000 0000 0000 0000 (18)
          "Remote off",                                                  // 0000 0000 0000 0100 0000 0000 0000 0000 (19)
          "Inverter over temperature",                                   // 0000 0000 0000 1000 0000 0000 0000 0000 (20)
          "Leakage current HCT abnormal",                                // 0000 0000 0001 0000 0000 0000 0000 0000 (21)
          "PV string reverse",                                           // 0000 0000 0010 0000 0000 0000 0000 0000 (22)
          "System type error",                                           // 0000 0000 0100 0000 0000 0000 0000 0000 (23)
          "Fan lock",                                                    // 0000 0000 1000 0000 0000 0000 0000 0000 (24)
          "Bus under voltage",                                           // 0000 0001 0000 0000 0000 0000 0000 0000 (25)
          "Bus over voltage",                                            // 0000 0010 0000 0000 0000 0000 0000 0000 (26)
          "Internal communication error",                                // 0000 0100 0000 0000 0000 0000 0000 0000 (27)
          "Software incompatibility",                                    // 0000 1000 0000 0000 0000 0000 0000 0000 (28)
          "EEPROM error",                                                // 0001 0000 0000 0000 0000 0000 0000 0000 (29)
          "Consistant warning",                                          // 0010 0000 0000 0000 0000 0000 0000 0000 (30)
          "Inverter abnormal",                                           // 0100 0000 0000 0000 0000 0000 0000 0000 (31)
          "Boost abnormal",                                              // 1000 0000 0000 0000 0000 0000 0000 0000 (32)
      };
      std::string values = "";
      uint32_t mask = modbus_controller::dword_from_hex_str(x, 0);
      ESP_LOGI("","Lambda incoming mask value  = %d",mask);
      if (mask) {
        for (int i = 0; i < WARNINGS_SIZE; i++) {
          if (mask & (1 << i)) {
            values.append(WARNINGS[i]);
            values.append(";");
          }
        }
        if (!values.empty()) {
          values.pop_back();
        }
      }
      if(values.length() == 0) values.append("No errors");
      return values;

  - platform: modbus_controller
    modbus_controller_id: fast
    id: warning_information
    name: "${cat2} Warning Information"
    entity_category: DIAGNOSTIC
    address: 0x2013
    register_type: holding
    #register_count: 3
    raw_encode: HEXBYTES
    #response_size: 6
    lambda: |-
      static const uint8_t WARNINGS16_SIZE = 16;
      static const char *const WARNINGS16[WARNINGS16_SIZE] = {
          "Battery absent",                                              // 0000 0000 0000 0000 0000 0000 0000 0001 (1)
          "Battery over volt",                                           // 0000 0000 0000 0000 0000 0000 0000 0010 (2)
          "Battery under volt",                                          // 0000 0000 0000 0000 0000 0000 0000 0100 (3)
          "Battery discharge over curr",                                 // 0000 0000 0000 0000 0000 0000 0000 1000 (4)
          "BMS - EMS communication loss",                                // 0000 0000 0000 0000 0000 0000 0001 0000 (5)
          "EPS over load",                                               // 0000 0000 0000 0000 0000 0000 0010 0000 (6)
          "DC current abnormal",                                         // 0000 0000 0000 0000 0000 0000 0100 0000 (7)
          "EPS short",                                                   // 0000 0000 0000 0000 0000 0000 1000 0000 (8)
          "Neutral fault",                                               // 0000 0000 0000 0000 0000 0001 0000 0000 (9)
          "Zero fire wire reverse",                                      // 0000 0000 0000 0000 0000 0010 0000 0000 (10)
          "EPS capacitance decrease",                                    // 0000 0000 0000 0000 0000 0100 0000 0000 (11)
          "BMS - EMS communication error",                               // 0000 0000 0000 0000 0000 1000 0000 0000 (12)
          "EMS - MasterDSP communication lost",                          // 0000 0000 0000 0000 0001 0000 0000 0000 (13)
          "Master DSP - DC/DC DSP communication lost",                   // 0000 0000 0000 0000 0010 0000 0000 0000 (14)
          "Reserevd",                                                    // 0000 0000 0000 0000 0100 0000 0000 0000 (15)
          "reserved",                                                    // 0000 0000 0000 0000 1000 0000 0000 0000 (16)
      };
      
      std::string values = "";
      uint16_t mask16 = modbus_controller::word_from_hex_str(x, 0);
      if (mask16) {
        for (int i = 0; i < WARNINGS16_SIZE; i++) {
        if (mask16 & (1 << i)) {
            values.append(WARNINGS16[i]);
            values.append("; ");
          }
        }
        if (!values.empty()) {
          values.pop_back();
        }
      }
      if(values.length() == 0) values.append("No warnings");
      return values;




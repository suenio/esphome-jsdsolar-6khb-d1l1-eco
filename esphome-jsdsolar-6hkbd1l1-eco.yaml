    address: 0x1A00 
    register_type: holding
    register_count: 8
    raw_encode: HEXBYTES
    response_size: 16
    lambda: |-
      int len = x.length();
      std::string newString;
      for(int i=0; i< len; i+=2)
      {
          std::string byte = x.substr(i,2);

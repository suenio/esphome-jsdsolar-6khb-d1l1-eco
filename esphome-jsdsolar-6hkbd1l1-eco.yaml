number:
  - platform: modbus_controller     #ok inverter settings -> QuickSettings(2) -> Discharge Stop Voltage (V)   - this is used only if capacity management mode is set to "Voltage"                            
    modbus_controller_id: fast
    id: discharge_stop_voltage
    name: "${cat3} Discharge Stop Voltage"
    entity_category: config
    use_write_multiple: true
    address: 0x2113
    value_type: U_WORD
    min_value: 40.0
    max_value: 62.0
    step: 0.1
    unit_of_measurement: "V"
    icon: mdi:cog
    lambda: "return x * 0.1f;"
    write_lambda: |-
      return x * 10.0f;

  - platform: modbus_controller                                   
    modbus_controller_id: fast
    id: stop_charge_voltage
    name: "${cat3} Stop charge voltage"
    entity_category: config

substitutions:
  name: jsdsolar
  device_description: "JSDSolar 6KHB D1/LV ECO Inverter"
  cat1: "[DI]"
  cat2: "[RTD]"
  cat3: "[P1]"
  cat4: "[P2]"
  tx_pin: GPIO22
  rx_pin: GPIO21

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome    
    password: !secret ota_password

esp32:
  #board: wemos_d1_mini32
  board: esp32dev
  framework:
    type: esp-idf
#esp32:
  #board: esp32-s3-devkitc-1
  #variant: ESP32S3
  #flash_size: 16MB
  #framework:
  #  type: arduino
#    version: 2.0.4
#  framework:
#    type: esp-idf
#    sdkconfig_options:
#      CONFIG_ESP32_S3_BOX_BOARD: "y"



wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80
  #version: 3
  #auth:
  #  username: !secret web_server_username
  #  password: !secret web_server_password  

logger:
  level: DEBUG
  #3level: DEBUG
  
# Set pins required for LilyGo T-CAN485 board comment out if using different board
output:
  - platform: gpio
    id: ENABLE_PIN # Enable the chip
    pin:
      number: GPIO19
      inverted: true
  - platform: gpio
    id: SE_PIN # Enable autodirection
    pin:
      number: GPIO17
      inverted: true
  - platform: gpio
    id: ENABLE_5V_PIN # Enable 5V pin for RS485 chip
    pin:
      number: GPIO16
      inverted: true

# =========================
# UART / MODBUS
# =========================
uart:
  id: uart_modbus
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  baud_rate: 9600

modbus:
  id: modbus1

modbus_controller:
  - id: fast
    address: 1
    modbus_id: modbus1
    update_interval: 15s
    setup_priority: -10
    #command_throttle: 10ms

  - id: medium
    address: 1
    modbus_id: modbus1
    update_interval: 5s
    setup_priority: -10
    command_throttle: 2ms

  - id: slow
    address: 1
    modbus_id: modbus1
    update_interval: 5s
    setup_priority: -10
    command_throttle: 30ms
  
  - id: very_slow
    address: 1
    modbus_id: modbus1
    update_interval: 10s
    setup_priority: -10
    command_throttle: 50ms

sensor:
# =========================
# ⚡ SYSTEM INFORMATION
# =========================
  - platform: modbus_controller
    modbus_controller_id: fast
    id: number_of_mppts
    name: "${cat1} Number of MPPTs"
    entity_category: DIAGNOSTIC
    address: 0x1A3B
    register_type: holding
    value_type: U_WORD
  
  - platform: modbus_controller
    modbus_controller_id: fast
    id: rated_voltage
    name: "${cat1} Rated Voltage"
    entity_category: DIAGNOSTIC
    address: 0x1A44
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: V
    filters: [{ multiply: 0.1 }] 

  - platform: modbus_controller
